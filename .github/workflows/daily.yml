name: "📈 StockAnalysis IndianMarket DailyPipeline"

on:
  schedule:
    - cron: "15 10 * * 1-5"
    - cron: "45 10 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "0 2 * * 2-6"
  workflow_dispatch:

concurrency:
  group: profitpilot-daily
  cancel-in-progress: false

jobs:
  pipeline:
    name: "Universe → Score → Backtest → Publish"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: finbert-v1-${{ runner.os }}-prosusai
          restore-keys: finbert-v1-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: .cache/ohlcv
          key: ohlcv-${{ runner.os }}-${{ hashFiles('config/universe_sources.yml') }}-${{ github.run_id }}
          restore-keys: ohlcv-${{ runner.os }}-${{ hashFiles('config/universe_sources.yml') }}-

      - name: Run pipeline
        run: python -m api.daily

      - name: Commit outputs
        if: always()
        run: |
          git config --global user.name "profitpilot-bot"
          git config --global user.email "bot@profitpilot.local"
          # Stage both success outputs AND the failure log so regressions
          # leave a stack trace in the repo (Actions logs rotate after 90d)
          git add predictions.json news_cache.json _last_failure.log 2>/dev/null || true
          if ! git diff --staged --quiet; then
            IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
            git commit -m "📈 predictions — ${IST}"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📈 ProfitPilot v3 Run Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f _last_failure.log ]; then
            echo "### ⚠️ Failure log present" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -60 _last_failure.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f predictions.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
import json
d = json.load(open("predictions.json"))
stale = d.get("_stale", False)
counts = d.get("counts", {})
picks = d.get("picks", [])
print("⚠️ **STALE**" if stale else "✅ **FRESH**")
print(f"- **Generated:** {d.get('generated_at_ist','?')}")
print(f"- **Picks:** {counts.get('picks','?')} | Near-misses: {counts.get('near_misses','?')}")
if stale:
    print(f"- **Stale reason:** `{d.get('_stale_reason','unknown')}`")
if picks:
  print(f"\n### Top 3 Picks")
  for i, p in enumerate(picks[:3], 1):
    print(f"{i}. **{p.get('symbol','?')}** — Score: {p.get('composite_score','?')} | Win%: {p.get('score_breakdown',{}).get('winrate_pct','—')}")
PY
          else
            echo "❌ predictions.json not found — pipeline may have failed" >> $GITHUB_STEP_SUMMARY
          fi
