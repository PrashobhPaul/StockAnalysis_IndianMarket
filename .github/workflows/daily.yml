name: "📈 Stoke Analysis Daily Pipeline"

on:
  schedule:
    - cron: "15 10 * * 1-5"
    - cron: "45 10 * * 1-5"
    - cron: "30 12 * * 1-5"
    - cron: "0 2 * * 2-6"
  workflow_dispatch:

concurrency:
  group: profitpilot-daily
  cancel-in-progress: false

jobs:
  pipeline:
    name: "Universe → Score → Backtest → Publish"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    env:
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache FinBERT weights
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: finbert-v1-${{ runner.os }}-prosusai
          restore-keys: |
            finbert-v1-${{ runner.os }}-

      - name: Cache OHLCV parquet
        uses: actions/cache@v4
        with:
          path: .cache/ohlcv
          key: ohlcv-${{ runner.os }}-${{ hashFiles('config/universe_sources.yml') }}-${{ github.run_id }}
          restore-keys: |
            ohlcv-${{ runner.os }}-${{ hashFiles('config/universe_sources.yml') }}-

      - name: Run pipeline (verbose, with retry)
        run: |
          set -e
          python -m api.daily 2>&1 | tee pipeline.log
          echo "✅ Pipeline succeeded"
          exit 0

      - name: Show pipeline log on failure
        if: failure()
        run: |
          echo "Pipeline log:"
          cat pipeline.log || echo "(no log file)"

      - name: Commit artifacts
        if: success()
        run: |
          git config --global user.name "profitpilot-bot"
          git config --global user.email "bot@profitpilot.local"
          git add predictions.json news_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            IST=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
            git commit -m "📈 predictions + news — ${IST}"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📈 ProfitPilot v3 Run Summary" >> "$GITHUB_STEP_SUMMARY"
          if [ -f predictions.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
import json
d = json.load(open("predictions.json"))
stale = d.get("_stale", False)
regime = d.get("regime", {})
brief = d.get("brief", {})
counts = d.get("counts", {})
picks = d.get("picks", [])
print("⚠️ **STALE**" if stale else "✅ **FRESH**")
print(f"- **Generated:** {d.get('generated_at_ist','?')}")
print(f"- **Picks:** {counts.get('picks','?')} | Near-misses: {counts.get('near_misses','?')}")
if picks:
    print(f"\n### Top Picks")
    for i, p in enumerate(picks[:3], 1):
        print(f"{i}. **{p.get('symbol','?')}** — {p.get('score','?')} | Win: {p.get('backtest_winrate_pct','—')}%")
PY
          else
            echo "❌ predictions.json not found"
          fi
