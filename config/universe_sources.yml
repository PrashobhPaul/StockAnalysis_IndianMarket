# Source-of-truth for HTTP headers / User-Agent. curl_cffi's
# impersonate="chrome" handles TLS fingerprint, but the request still needs
# plausible headers or niftyindices returns a redirect loop.
http:
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
  accept: "text/csv,application/json,text/plain,*/*"
  accept_language: "en-US,en;q=0.9"
  timeout_seconds: 15
